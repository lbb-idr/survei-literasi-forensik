<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GForm Creator</title>
<style>
  :root {
    --primary: #1a73e8;
    --success: #1e8e3e;
    --error: #d93025;
    --bg: #f8f9fa;
    --card: #fff;
    --border: #dadce0;
    --text: #202124;
    --muted: #5f6368;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 480px;
    min-height: 360px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
  }
  h1 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h1 span { background: var(--primary); color: white; font-size: 9px; padding: 2px 6px; border-radius: 8px; letter-spacing: 0.5px; }
  .subtitle { font-size: 11px; color: var(--muted); margin-bottom: 14px; }
  label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 4px; }
  textarea {
    width: 100%;
    height: 180px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 11px;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    background: var(--card);
    color: var(--text);
  }
  textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,0.15); }
  .toolbar { display: flex; gap: 6px; margin: 8px 0; }
  .btn {
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    background: var(--card);
    color: var(--text);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .btn:hover { background: #f1f3f4; }
  .btn-primary {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .btn-primary:hover { background: #1558b0; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .status {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 4px;
    font-size: 12px;
    line-height: 1.5;
    display: none;
  }
  .status-loading { display: block; background: #e8f0fe; color: var(--primary); border: 1px solid #c5d9f8; }
  .status-success { display: block; background: #e6f4ea; color: var(--success); border: 1px solid #b7e1cd; }
  .status-error { display: block; background: #fce8e6; color: var(--error); border: 1px solid #f5c6c2; }
  .status a { color: inherit; font-weight: 600; }
  .status .url { display: block; margin-top: 4px; word-break: break-all; font-size: 11px; }
  .footer { margin-top: 12px; font-size: 10px; color: var(--muted); text-align: center; }
  .badge-count { font-size: 10px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>

<h1>GForm Creator <span>v1.0</span></h1>
<div class="subtitle">Tempel JSON definisi form dari Gemini → klik Buat</div>

<label for="jsonInput">Definisi Form (JSON)</label>
<textarea id="jsonInput" placeholder="Tempel JSON output Gemini di sini...&#10;&#10;Atau klik 'Tempel dari Clipboard'"></textarea>

<div class="toolbar">
  <button class="btn" id="pasteBtn" title="Tempel dari clipboard">📋 Tempel</button>
  <button class="btn" id="clearBtn" title="Hapus">✕ Hapus</button>
  <button class="btn" id="loadSampleBtn" title="Muat contoh">📄 Contoh</button>
  <button class="btn btn-primary" id="createBtn" disabled>🚀 Buat Google Form</button>
</div>

<div id="status" class="status"></div>

<div class="footer">
  Mengirim definisi ke Apps Script Anda &mdash; form dibuat via FormApp API
</div>

<script src="popup.js"></script>
</body>
</html>
